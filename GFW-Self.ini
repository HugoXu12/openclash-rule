# 必读！！！
# 此版本没有做防泄露处理，如介意请使用另一个名字为configdns的版本
# 注意规则在满足自己需求情况下，尽量做到精简，不要过度复杂，以免影响性能。
# 跑裸核用户请自行去掉下方控制面板模块的注释。
# 机场订阅
proxies:
  - name: vless-reality-2
    server: 104.224.152.243
    port: 443
    type: vless
    uuid: 52fee28b-37e4-4787-be2a-c4860b501506
    tls: true
    flow: xtls-rprx-vision
    servername: statici.icloud.com
    client-fingerprint: chrome
    reality-opts:
      public-key: wgha8uLZhwl0EpTItVi0YMbNYttBqeS822nothwFDAI


# 全局配置 
mixed-port: 7890
allow-lan: true
bind-address: "*"
ipv6: false
unified-delay: true
tcp-concurrent: true
log-level: warning
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
#external-controller: 0.0.0.0:9090
#secret: ""
#external-ui: ui
#external-ui-name: zashboard
#external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站
tun:
  enable: true
  # system/gvisor/mixed
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #device: nikki
  #使用仅内核自行修改下面三项为true
  auto-route: false
  auto-redirect: false
  auto-detect-interface: false

# DNS模块
dns:
  enable: true
  cache-algorithm: arc
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "rule-set:fakeipfilter_domain"
  default-nameserver:
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

proxy-groups:
  - {name: 🚀 节点选择, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: YouTube-rule, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: Google-rule, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: AI-rule, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: NETFLIX-rule, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: 🐟 漏网之鱼, type: select, proxies: [♻️ 自动选择, 直连], include-all: true}
  - {name: ♻️ 自动选择, type: url-test, include-all: true, tolerance: 20, interval: 300}

# 规则匹配
rules:
  - RULE-SET,Youtube,YouTube-rule
  - RULE-SET,Google,Google-rule
  - RULE-SET,AI,AI-rule
  - RULE-SET,Netflix,NETFLIX-rule
  - MATCH,🐟 漏网之鱼

rule-providers: 

  Youtube:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/YouTube.list?token=GHSAT0AAAAAAD2E7QG3RZOSIXUPTYBVZRSK2O77C4A
    path: ./ruleset/youtube.yaml
    interval: 86400

  Google:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HugoXu12/openclash-rules-auto/refs/heads/main/rules/Google.list
    path: ./ruleset/netflix.yaml
    interval: 86400

  AI:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HugoXu12/openclash_auto-build/refs/heads/main/rules/AI.list?token=GHSAT0AAAAAAD2E7QG3AY5XLZOO4XVARTDQ2O77DXA
    path: ./ruleset/AI.yaml
    interval: 86400

  Netflix:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/HugoXu12/openclash-rules-auto/refs/heads/main/rules/Google.list
    path: ./ruleset/netflix.yaml
    interval: 86400
